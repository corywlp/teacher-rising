<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Rising — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1E1E1E;
      color: #F2EDE4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px 120px;
    }
    .logo img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 12px;
    }
    .coming-soon {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: #F2EDE4;
      letter-spacing: -0.5px;
      text-align: center;
    }
    .coming-soon span { color: #C9622F; }
    .bar-wrap {
      width: 320px;
      height: 4px;
      background: #333;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: #C9622F;
      border-radius: 99px;
      animation: load 3.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 75%; }
      85%  { width: 88%; }
      100% { width: 92%; }
    }
    .bar-caption {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #A89070;
      text-align: center;
    }
    .one-pager-link {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #A89070;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      padding-bottom: 2px;
    }
    .one-pager-link:hover {
      color: #C9622F;
      border-color: #C9622F;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="logo.jpg" alt="Teacher Rising" />
  </div>
  <div class="coming-soon">Teacher <span>Rising</span></div>
  <div class="bar-wrap">
    <div class="bar-fill"></div>
  </div>
  <div class="bar-caption">Loading Almost Complete. Full Website Coming Soon.</div>
  <a class="one-pager-link" href="one-pager.html">View Our One Pager</a>
</body>
</html>
