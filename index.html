<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Rising — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1E1E1E;
      color: #F2EDE4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px 120px;
    }
    .logo img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 12px;
    }
    .coming-soon {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      font-weight: 900;
      color: #F2EDE4;
      letter-spacing: -0.5px;
      text-align: center;
    }
    .coming-soon span { color: #C9622F; }
    .bar-wrap {
      width: 440px;
      height: 8px;
      background: #333;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: #C9622F;
      border-radius: 99px;
      position: relative;
      overflow: hidden;
      animation: load 3.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 75%; }
      85%  { width: 88%; }
      100% { width: 92%; }
    }
    .bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -60%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: shimmer 2.2s ease-in-out 3.6s infinite;
    }
    @keyframes shimmer {
      0%   { left: -60%; }
      100% { left: 160%; }
    }
    .bar-caption {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #A89070;
      text-align: center;
      opacity: 0;
      animation: fadein 0.9s ease forwards 3.4s;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .one-pager-link {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #F2EDE4;
      background: #C9622F;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 4px;
      transition: background 0.2s, transform 0.15s;
    }
    .one-pager-link:hover {
      background: #a84e23;
      transform: translateY(-1px);
    }
  @media (max-width: 600px) {
      body { gap: 18px; padding: 32px 20px 80px; }
      .logo img { width: 90px; height: 90px; }
      .coming-soon { font-size: 2.6rem; }
      .bar-wrap { width: 90%; }
      .bar-caption { font-size: 0.75rem; letter-spacing: 1px; }
      .one-pager-link { padding: 12px 28px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="logo.jpg" alt="Teacher Rising" />
  </div>
  <div class="coming-soon">Teacher <span>Rising</span></div>
  <div class="bar-wrap">
    <div class="bar-fill"></div>
  </div>
  <div class="bar-caption">Loading Almost Complete. Full Site Coming Soon.</div>
  <a class="one-pager-link" href="one-pager.html">View Our One Pager</a>
</body>
</html>
